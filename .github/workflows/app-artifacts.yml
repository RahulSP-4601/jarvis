name: Jarvis Desktop Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "jarvis-app-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        run: npm run dist:${{ matrix.target }}

      - name: Upload installable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-download-${{ matrix.os }}
          path: release

      - name: Publish tagged release assets
        if: startsWith(github.ref, 'refs/tags/jarvis-app-v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
